<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sivapp - Scopri Eventi Musicali e Culturali</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      color: #ff5733;
    }
    p {
      font-size: 1.2rem;
      margin-top: 10px;
    }
    .btn-container {
      margin-top: 30px;
    }
    .btn {
      background-color: #ff5733;
      color: white;
      border: none;
      padding: 15px 25px;
      margin: 10px;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 5px;
      text-decoration: none;
    }
    .btn:hover {
      background-color: #e54d28;
    }
  </style>
</head>
<body>
  <h1>Benvenuto su Sivapp!</h1>
  <p>Scopri eventi musicali e culturali nella tua città. Scarica Sivapp per partecipare agli eventi più interessanti!</p>

  <div class="btn-container">
    <!-- Link per Google Play Store -->
    <a href="https://play.google.com/store/apps/details?id=com.sivapp" class="btn">Scarica per Android</a>

    <!-- Link per Apple App Store (aggiungi il link corretto quando l'app è disponibile) -->
    <a href="https://apps.apple.com/us/app/sivapp/id1234567890" class="btn">Scarica per iOS</a>
  </div>
</body>
</html>
