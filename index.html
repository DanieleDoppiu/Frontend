<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apri Sivapp</title>
  <script>
    // Otteniamo i parametri dall'URL
    function getParameterByName(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    const eventoId = getParameterByName('eventoId');
    const user = getParameterByName('user');

    // Funzione di redirect intelligente
    function redirectToApp() {
      const deepLink = `sivapp://dettagli/${eventoId}?segui=${user}`;
      const playStoreUrl = 'https://play.google.com/store/apps/details?id=com.sivapp';

      const isAndroid = /android/i.test(navigator.userAgent);
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

      if (isAndroid || isIOS) {
        // Prova ad aprire l'app
        window.location.href = deepLink;

        // Dopo 2 secondi, se non si è aperta, manda al Play Store
        setTimeout(() => {
          window.location.href = playStoreUrl;
        }, 2000);
      } else {
        // Da desktop → solo Play Store
        window.location.href = playStoreUrl;
      }
    }

    window.onload = redirectToApp;
  </script>
</head>
<body>
  <h2>Stiamo aprendo Sivapp...</h2>
  <p>Se non succede nulla, <a id="fallbackLink" href="https://play.google.com/store/apps/details?id=com.sivapp">clicca qui per scaricare l'app</a>.</p>
</body>
</html>
